newPRWelcomeComment: |
  Thanks for opening a pull request and helping make compact_index better! A maintainer will take a look at your pull request shortly and leave any feedback. Please make sure that your pull request has tests for any changes or added functionality.

  We use GitHub Actions to test and make sure your change works functionally and uses acceptable conventions, you can review the current progress of GitHub Actions in the PR status window below.

  If you have any questions or concerns, feel free to leave a comment in this PR.
